<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wanna — Swipe Less. Do More.</title>
  <meta name="description" content="Wanna is a new social app that matches you based on what you like to do — not just how you look. Post an activity, swipe on plans, and meet someone who shares your interests. Join the waitlist.">
  <meta property="og:title" content="Wanna — Swipe Less. Do More.">
  <meta property="og:description" content="Post an activity. Swipe on the plan. Match when you both want the same experience. Join the waitlist.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://joinwannaapp.com">
  <link rel="icon" type="image/png" href="wanna-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple: #8C52FF;
      --font-display: "Quicksand", system-ui, sans-serif;
      --font-body: "Helvetica Neue", "Helvetica", "Arial", system-ui, sans-serif;
      --shadow-brand: 0 12px 30px rgba(140,82,255,0.32);
    }

    html { scroll-behavior: smooth; background: #86E2EB; }

    body {
      font-family: var(--font-body);
      background: linear-gradient(165deg, #7B3FE4 0%, #8C52FF 35%, #57B8D0 70%, #86E2EB 100%);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .wordmark {
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(140, 82, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    nav .wordmark {
      font-size: 26px;
      color: #fff;
    }
    nav .nav-cta {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      padding: 9px 20px;
      border-radius: 9999px;
      border: none;
      background: #fff;
      color: var(--purple);
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    nav .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    /* ── LAYOUT ── */
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 90px 24px 40px;
      gap: 32px;
    }

    /* ── HERO CONTENT ── */
    .hero-content {
      text-align: center;
      max-width: 900px;
    }
    .hero-wordmark {
      font-size: 78px;
      color: #fff;
      margin-bottom: 12px;
    }
    .hero-tagline {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 36px;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 16px;
    }
    .hero-desc {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 18px;
      line-height: 1.55;
      color: rgba(255,255,255,0.88);
      max-width: 800px;
      margin: 0 auto 28px;
    }
    .hero-cta {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 17px;
      padding: 14px 36px;
      border-radius: 9999px;
      border: none;
      background: #fff;
      color: var(--purple);
      cursor: pointer;
      text-decoration: none;
      box-shadow: var(--shadow-brand);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .hero-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(140,82,255,0.4);
    }

    /* ── MOCKUPS ── */
    .mockups {
      display: flex;
      gap: 0;
      align-items: flex-start;
      justify-content: center;
    }
    .mockups img {
      width: 500px;
      height: auto;
      display: block;
      margin: 0 -80px;
    }

    /* ── FOOTER ── */
    .footer-line {
      text-align: center;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      padding-bottom: 8px;
    }
    .footer-line a {
      color: rgba(255,255,255,0.7);
      text-decoration: underline;
    }

    /* ── SLIDESHOW (mobile only) ── */
    @keyframes slide1 {
      0%, 30%       { transform: translateX(0); }
      33%, 33.01%   { transform: translateX(-100%); }
      33.02%        { transform: translateX(100%); }
      66%, 96%      { transform: translateX(100%); }
      100%          { transform: translateX(0); }
    }
    @keyframes slide2 {
      0%, 30%       { transform: translateX(100%); }
      33%, 63%      { transform: translateX(0); }
      66%, 66.01%   { transform: translateX(-100%); }
      66.02%        { transform: translateX(100%); }
      100%          { transform: translateX(100%); }
    }
    @keyframes slide3 {
      0%, 63%       { transform: translateX(100%); }
      66%, 96%      { transform: translateX(0); }
      99%, 99.01%   { transform: translateX(-100%); }
      99.02%        { transform: translateX(100%); }
      100%          { transform: translateX(100%); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .page { padding: 80px 20px 32px; gap: 16px; justify-content: flex-start; }
      .hero-wordmark { font-size: 54px; }
      .hero-tagline { font-size: 26px; }
      .hero-desc { font-size: 15px; }
      .mockups {
        position: relative;
        width: 100vw;
        aspect-ratio: 1080 / 1350;
        margin: 0 -20px;
        overflow: hidden;
      }
      .mockups img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        object-fit: contain;
        animation-duration: 15s;
        animation-iteration-count: infinite;
        animation-timing-function: ease-in-out;
      }
      .mockups img:nth-child(1) { animation-name: slide1; }
      .mockups img:nth-child(2) { animation-name: slide2; }
      .mockups img:nth-child(3) { animation-name: slide3; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <span class="wordmark">wanna</span>
    <a href="#waitlist" class="nav-cta">Join the Waitlist</a>
  </nav>

  <div class="page">

    <!-- HERO CONTENT -->
    <div class="hero-content">
      <div class="wordmark hero-wordmark">wanna</div>
      <h1 class="hero-tagline">Swipe less. Do more.</h1>
      <p class="hero-desc">Wanna is a new social app that matches you based on what you like to do &ndash; not just how you look. Post an activity, swipe on plans, and meet someone who shares your interests.</p>
      <a href="#waitlist" class="hero-cta">Join the Waitlist</a>
    </div>

    <!-- MOCKUPS -->
    <div class="mockups">
      <img src="discover_mockup.png" alt="Discover screen showing a hiking activity card">
      <img src="activity_mockup.png" alt="Activity detail screen showing a ramen dinner plan">
      <img src="match_mockup.png" alt="Match screen celebrating a tennis plan">
    </div>

    <!-- FOOTER -->
    <div class="footer-line">&copy; 2026 Wanna &middot; <a href="mailto:hello@joinwannaapp.com">hello@joinwannaapp.com</a></div>

  </div>

  <!-- TALLY POPUP -->
  <div id="waitlist"></div>
  <script src="https://tally.so/widgets/embed.js"></script>
  <script>
    document.querySelectorAll('a[href="#waitlist"]').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.preventDefault();
        Tally.openPopup('jaGKqR', { layout: 'modal', hideTitle: true });
      });
    });
  </script>

</body>
</html>
